spring.application.name=AiModel
# Database Configuration with Environment Variable Fallbacks
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/prepedgedb}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server Port
server.port=${PORT:8080}

# AI Provider Configuration
groq.api.key=${GROQ_API_KEY:}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.1-8b-instant

# JWT Configuration
jwt.secret=kjfajkdkabhbegiebfaksfgakeufanksdgakubkaskagukfgakusbnckuasu

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:5173,*

# Disable open-in-view (prevents unnecessary DB queries during view rendering)
spring.jpa.open-in-view=false

# Suppress the AuthenticationProvider/UserDetailsService auto-config warning
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR
